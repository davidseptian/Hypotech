<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypotech Finance — Financial Backend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c;
    --panel:#141218;
    --panel-2:#1c1922;
    --line:#2b2731;
    --gold:#c9a227;
    --gold-light:#e9c767;
    --gold-dim:#5f4f19;
    --text:#f3f1ea;
    --text-dim:#9a968c;
    --danger:#c1443a;
    --success:#4e8b5c;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand{font-family:'Space Grotesk',sans-serif;}
  button{font-family:'Inter',sans-serif; cursor:pointer;}
  a{color:inherit; text-decoration:none;}

  /* ---------- LOCK SCREEN ---------- */
  #lock-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .lock-card{
    width:100%; max-width:360px;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:34px 30px 28px; box-shadow:0 30px 60px -20px rgba(0,0,0,.6);
  }
  .brand-wrap{text-align:center; margin-bottom:22px;}
  .brand{
    font-size:26px; font-weight:700; letter-spacing:.4px;
    background:linear-gradient(90deg,var(--gold-light),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand-sub{color:var(--text-dim); font-size:12px; margin-top:6px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px;}
  .field input{
    width:100%; padding:11px 13px; border-radius:9px;
    border:1px solid var(--line); background:#0f0d12; color:var(--text);
    font-size:14px; outline:none;
  }
  .field input:focus{border-color:var(--gold-dim);}
  .btn-primary{
    width:100%; padding:12px; border-radius:9px; border:none;
    background:linear-gradient(90deg,var(--gold),var(--gold-light));
    color:#151016; font-weight:700; font-size:14px;
  }
  .lock-error{color:var(--danger); font-size:12.5px; margin-top:10px; min-height:16px; text-align:center;}
  .lock-hint{text-align:center; margin-top:16px; font-size:11px; color:#5f5b53; border-top:1px solid var(--line); padding-top:12px;}

  /* ---------- APP ---------- */
  #app{display:none;}
  header.topbar{
    background:#111014; border-bottom:1px solid var(--line);
    padding:0 28px; position:sticky; top:0; z-index:5;
  }
  .topbar-row{
    display:flex; align-items:center; justify-content:space-between; height:60px;
  }
  .brand-mini{font-size:17px; letter-spacing:.3px;}
  .brand-mini .accent{color:var(--gold-light);}
  .topbar-actions{display:flex; align-items:center; gap:10px;}
  .btn-ghost{
    background:transparent; border:1px solid var(--line); color:var(--text);
    padding:7px 13px; border-radius:8px; font-size:12px;
  }
  .btn-ghost:hover{border-color:var(--gold-dim); color:var(--gold-light);}

  nav.tabs{
    display:flex; gap:4px; border-top:1px solid var(--line); overflow-x:auto;
  }
  .tab-btn{
    background:none; border:none; color:var(--text-dim);
    padding:13px 18px; font-size:13.5px; font-weight:600; letter-spacing:.2px;
    border-bottom:2px solid transparent; white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--gold-light); border-bottom-color:var(--gold);}
  .tab-btn .chev{font-size:10px; opacity:.6;}

  main{padding:32px 28px 60px; max-width:1100px; margin:0 auto;}
  .tab-head{margin-bottom:18px;}
  .tab-head h2{margin:0 0 4px; font-size:18px;}
  .tab-head p{margin:0; font-size:12.5px; color:var(--text-dim);}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px;}
  .card{
    background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; display:flex; flex-direction:column; gap:10px;
    transition:transform .15s, border-color .15s;
  }
  .card:hover{transform:translateY(-3px); border-color:var(--gold-dim);}
  .card .icon{font-size:26px;}
  .card h3{margin:0; font-size:14.5px;}
  .card p{margin:0; font-size:12px; color:var(--text-dim); line-height:1.5; flex:1;}
  .card-open{
    align-self:flex-start; margin-top:4px; font-size:12px; font-weight:600;
    color:var(--gold-light); border:1px solid var(--gold-dim); padding:6px 12px; border-radius:7px;
    background:rgba(201,162,39,.08);
  }
  .card-open:hover{background:rgba(201,162,39,.18);}

  @media(max-width:640px){
    header.topbar{padding:0 16px;}
    main{padding:24px 16px 50px;}
  }
</style>
</head>
<body>

<!-- ================= LOCK SCREEN ================= -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="brand-wrap">
      <div class="brand">FINANCIAL BACKEND</div>
      <div class="brand-sub">Akses pribadi David — bagian dari ekosistem Hypotech</div>
    </div>
    <div class="field">
      <label for="lock-password">Password</label>
      <input id="lock-password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="attemptUnlock()">Masuk</button>
    <div class="lock-error" id="lock-error"></div>
    <div class="lock-hint">Halaman ini terpisah dari Hypotech utama dan tidak terhubung ke akun admin.</div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <header class="topbar">
    <div class="topbar-row">
      <div class="brand-mini">HYPOTECH <span class="accent">FINANCE</span></div>
      <div class="topbar-actions">
        <button class="btn-ghost" onclick="changePassword()">Ganti Password</button>
        <button class="btn-ghost" onclick="lock()">Kunci</button>
      </div>
    </div>
    <nav class="tabs" id="tabs"></nav>
  </header>
  <main>
    <div class="tab-head" id="tab-head"></div>
    <div class="grid" id="tab-grid"></div>
  </main>
</div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const STRUCTURES = [
  {
    id:'financial-detail',
    label:'Financial Detail',
    sub:'Spending, Cashflow, Cost',
    items:[
      { name:'Catatan SHU 2026', icon:'📒',
        desc:'Catatan Sisa Hasil Usaha (SHU) Hypospot tahun 2026.',
        url:'https://docs.google.com/spreadsheets/d/1VHl7FAEQaQJHJQQ3jSFiE-t2LlWNTwGbiR6fQmzRxWs/edit?gid=175025651#gid=175025651' },
      { name:'Pengeluaran 2026', icon:'📤',
        desc:'Catatan pengeluaran operasional Hypospot tahun 2026.',
        url:'https://docs.google.com/spreadsheets/d/1sYukhsnZpzagl7ecETIMnuhTP8QMcrrwpqB4kuKs4wg/edit?gid=510449685#gid=510449685' },
      { name:'Penjualan 2026', icon:'🧾',
        desc:'Rekap penjualan Hypospot sepanjang tahun 2026.',
        url:'https://docs.google.com/spreadsheets/d/129Ne2jVjc9mQOd5vXbHvY0MYx-egw6s0CAqJjlPr-hQ/edit?gid=413872453#gid=413872453' },
    ]
  },
  {
    id:'finance-backend',
    label:'Finance Backend',
    sub:'Pencatatan dan recap semua aset yang dimiliki oleh Hypospot',
    items:[
      { name:'Spreadsheet Aset', icon:'📊',
        desc:'Sumber data pencatatan seluruh aset Hypospot.',
        url:'https://docs.google.com/spreadsheets/d/1KhJxgdoegK7KVcFOqoP8zWKtVF0WkQp3edN630c9B9w/edit?gid=0#gid=0' },
      { name:'Dashboard Aset', icon:'📈',
        desc:'Visualisasi recap aset Hypospot via Looker Studio.',
        url:'https://datastudio.google.com/u/0/reporting/6e46231f-15a1-4dd5-b2d2-161cf06670a5/page/66XoF' },
    ]
  }
];

const PASS_KEY = 'hypotech_finance_pass_v1';
const SESSION_KEY = 'hypotech_finance_session_v1';
const DEFAULT_PASSWORD = 'hypofinance2026';

function getPassword(){
  return localStorage.getItem(PASS_KEY) || DEFAULT_PASSWORD;
}

let activeTab = STRUCTURES[0].id;

/* ============================================================
   LOCK / UNLOCK
   ============================================================ */
function attemptUnlock(){
  const input = document.getElementById('lock-password');
  const err = document.getElementById('lock-error');
  if(input.value === getPassword()){
    sessionStorage.setItem(SESSION_KEY, '1');
    showApp();
  } else {
    err.textContent = 'Password salah.';
  }
}

function lock(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('app').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('lock-password').value = '';
  document.getElementById('lock-error').textContent = '';
}

function changePassword(){
  const current = prompt('Masukkan password saat ini untuk konfirmasi:');
  if(current === null) return;
  if(current !== getPassword()){ alert('Password saat ini salah.'); return; }
  const next = prompt('Masukkan password baru:');
  if(!next) return;
  localStorage.setItem(PASS_KEY, next);
  alert('Password berhasil diganti.');
}

function showApp(){
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderTabs();
  renderTabContent();
}

/* ============================================================
   RENDER
   ============================================================ */
function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  STRUCTURES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (s.id === activeTab ? ' active' : '');
    btn.innerHTML = escapeHtml(s.label) + ' <span class="chev">▾</span>';
    btn.addEventListener('click', () => { activeTab = s.id; renderTabs(); renderTabContent(); });
    tabsEl.appendChild(btn);
  });
}

function renderTabContent(){
  const structure = STRUCTURES.find(s => s.id === activeTab);
  const head = document.getElementById('tab-head');
  const grid = document.getElementById('tab-grid');
  head.innerHTML = '<h2>' + escapeHtml(structure.label) + '</h2><p>' + escapeHtml(structure.sub) + '</p>';
  grid.innerHTML = '';
  structure.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="icon">' + item.icon + '</div>' +
      '<h3>' + escapeHtml(item.name) + '</h3>' +
      '<p>' + escapeHtml(item.desc) + '</p>' +
      '<button class="card-open">Buka →</button>';
    card.querySelector('.card-open').addEventListener('click', () => {
      window.open(item.url, '_blank', 'noopener');
    });
    grid.appendChild(card);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ============================================================
   INIT
   ============================================================ */
if(sessionStorage.getItem(SESSION_KEY) === '1'){
  showApp();
}
document.getElementById('lock-password').addEventListener('keydown', e => {
  if(e.key === 'Enter') attemptUnlock();
});
</script>
</body>
</html>
