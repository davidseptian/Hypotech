<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypotech — Hypospot System Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c;
    --panel:#141218;
    --panel-2:#1c1922;
    --line:#2b2731;
    --gold:#c9a227;
    --gold-light:#e9c767;
    --gold-dim:#5f4f19;
    --text:#f3f1ea;
    --text-dim:#9a968c;
    --danger:#c1443a;
    --success:#4e8b5c;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand{font-family:'Space Grotesk',sans-serif;}
  button{font-family:'Inter',sans-serif; cursor:pointer;}
  a{color:inherit; text-decoration:none;}

  /* ---------- background network motif ---------- */
  .net-bg{
    position:fixed; inset:0; z-index:0; opacity:.35; pointer-events:none;
  }

  /* ---------- LOGIN ---------- */
  #login-screen{
    position:relative; z-index:1;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .login-card{
    position:relative; z-index:2;
    width:100%; max-width:380px;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:36px 32px 30px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.6);
  }
  .brand-wrap{text-align:center; margin-bottom:26px;}
  .brand{
    font-size:30px; font-weight:700; letter-spacing:.5px;
    background:linear-gradient(90deg,var(--gold-light),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand-sub{color:var(--text-dim); font-size:12.5px; margin-top:6px; letter-spacing:.4px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; letter-spacing:.3px;}
  .field input{
    width:100%; padding:11px 13px; border-radius:9px;
    border:1px solid var(--line); background:#0f0d12; color:var(--text);
    font-size:14px; outline:none; transition:border-color .15s;
  }
  .field input:focus{border-color:var(--gold-dim);}
  .btn-primary{
    width:100%; padding:12px; border-radius:9px; border:none;
    background:linear-gradient(90deg,var(--gold),var(--gold-light));
    color:#151016; font-weight:700; font-size:14px; letter-spacing:.3px;
    margin-top:6px;
  }
  .btn-primary:hover{filter:brightness(1.05);}
  .login-error{
    color:var(--danger); font-size:12.5px; margin-top:10px; min-height:16px; text-align:center;
  }
  .login-hint{
    text-align:center; margin-top:18px; font-size:11.5px; color:#5f5b53;
    border-top:1px solid var(--line); padding-top:14px;
  }

  /* ---------- DASHBOARD ---------- */
  #dashboard{display:none; position:relative; z-index:1; min-height:100vh;}
  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px; border-bottom:1px solid var(--line);
    background:rgba(20,18,24,.7); backdrop-filter:blur(6px);
    position:sticky; top:0; z-index:5;
  }
  .topbar-left{display:flex; align-items:center; gap:12px;}
  .topbar .brand{font-size:20px;}
  .badge-role{
    font-size:10.5px; padding:3px 9px; border-radius:20px; border:1px solid var(--gold-dim);
    color:var(--gold-light); letter-spacing:.4px; text-transform:uppercase;
  }
  .topbar-right{display:flex; align-items:center; gap:10px;}
  .greet{font-size:13px; color:var(--text-dim);}
  .btn-ghost{
    background:transparent; border:1px solid var(--line); color:var(--text);
    padding:8px 14px; border-radius:8px; font-size:12.5px;
  }
  .btn-ghost:hover{border-color:var(--gold-dim); color:var(--gold-light);}
  .btn-ghost.danger:hover{border-color:var(--danger); color:#e78a83;}

  .cat-tabs{
    display:flex; gap:4px; padding:0 32px; border-bottom:1px solid var(--line);
    background:rgba(20,18,24,.5); overflow-x:auto;
  }
  .cat-tab-btn{
    background:none; border:none; color:var(--text-dim);
    padding:13px 16px; font-size:13px; font-weight:600; letter-spacing:.2px;
    border-bottom:2px solid transparent; white-space:nowrap;
  }
  .cat-tab-btn:hover{color:var(--text);}
  .cat-tab-btn.active{color:var(--gold-light); border-bottom-color:var(--gold);}

  main{padding:34px 32px 60px; max-width:1180px; margin:0 auto;}
  .category{margin-bottom:38px;}
  .category-head{margin-bottom:14px;}
  .category-head h2{font-size:16px; margin:0 0 3px; letter-spacing:.3px;}
  .category-head p{margin:0; font-size:12.5px; color:var(--text-dim);}
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px;
  }
  .card{
    background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; display:flex; flex-direction:column; gap:10px;
    transition:transform .15s, border-color .15s;
  }
  .card:hover{transform:translateY(-3px); border-color:var(--gold-dim);}
  .card .icon{font-size:26px;}
  .card h3{margin:0; font-size:14.5px;}
  .card p{margin:0; font-size:12px; color:var(--text-dim); line-height:1.5; flex:1;}
  .card-open{
    align-self:flex-start; margin-top:4px; font-size:12px; font-weight:600;
    color:var(--gold-light); border:1px solid var(--gold-dim); padding:6px 12px; border-radius:7px;
    background:rgba(201,162,39,.08);
  }
  .card-open:hover{background:rgba(201,162,39,.18);}
  .empty-state{
    color:var(--text-dim); font-size:13px; border:1px dashed var(--line);
    padding:22px; border-radius:var(--radius); text-align:center;
  }

  /* ---------- SETTINGS PANEL ---------- */
  #settings-overlay{
    display:none; position:fixed; inset:0; z-index:20; background:rgba(6,5,7,.72);
    align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto;
  }
  .settings-modal{
    width:100%; max-width:820px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:28px 28px 30px;
  }
  .settings-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .settings-head h2{margin:0; font-size:18px;}
  .settings-sub{color:var(--text-dim); font-size:12.5px; margin:0 0 20px;}
  .admin-block{
    border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:16px;
    background:var(--panel-2);
  }
  .admin-block-head{display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:12px;}
  .admin-block-head .field{margin:0; flex:1; min-width:140px;}
  .perm-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:8px 14px; margin-bottom:12px;
  }
  .perm-item{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--text);}
  .perm-item input{accent-color:var(--gold);}
  .admin-actions{display:flex; gap:10px; justify-content:flex-end;}
  .btn-small{padding:7px 13px; font-size:12px; border-radius:7px; border:1px solid var(--line); background:transparent; color:var(--text);}
  .btn-small:hover{border-color:var(--gold-dim); color:var(--gold-light);}
  .btn-small.danger{color:#e78a83; border-color:#5a2b28;}
  .btn-small.danger:hover{background:rgba(193,68,58,.12);}
  .add-admin-row{text-align:center; margin-top:6px;}
  .settings-footer{display:flex; justify-content:space-between; align-items:center; margin-top:22px; border-top:1px solid var(--line); padding-top:16px;}
  .save-note{font-size:12px; color:var(--success); min-height:16px;}

  @media(max-width:640px){
    header.topbar{padding:14px 18px;}
    main{padding:24px 16px 50px;}
    .topbar .greet{display:none;}
  }
</style>
</head>
<body>

<svg class="net-bg" id="netbg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice"></svg>

<!-- ================= LOGIN ================= -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand-wrap">
      <div class="brand">HYPOTECH</div>
      <div class="brand-sub">Satu pintu untuk semua sistem Hypospot</div>
    </div>
    <div class="field">
      <label for="login-username">Username</label>
      <input id="login-username" type="text" autocomplete="username" placeholder="mis. david / admin">
    </div>
    <div class="field">
      <label for="login-password">Password</label>
      <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="attemptLogin()">Masuk</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint">Login internal tim Hypospot. Hubungi David jika lupa akses.</div>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">HYPOTECH</div>
      <span class="badge-role" id="role-badge">role</span>
    </div>
    <div class="topbar-right">
      <span class="greet" id="greet-text"></span>
      <button class="btn-ghost" id="finance-btn" onclick="window.open('Hypotech-Finance.html','_blank','noopener')" style="display:none;">Financial Backend</button>
      <button class="btn-ghost" id="settings-btn" onclick="openSettings()" style="display:none;">Pengaturan Akses</button>
      <button class="btn-ghost danger" onclick="logout()">Keluar</button>
    </div>
  </header>
  <nav class="cat-tabs" id="cat-tabs">
    <!-- category filter buttons injected by JS -->
  </nav>

  <main id="main-content">
    <!-- categories injected by JS -->
  </main>
</div>

<!-- ================= SETTINGS OVERLAY ================= -->
<div id="settings-overlay">
  <div class="settings-modal">
    <div class="settings-head">
      <h2>Pengaturan Akses Admin</h2>
      <button class="btn-ghost" onclick="closeSettings()">Tutup</button>
    </div>
    <p class="settings-sub">Atur akun admin dan tentukan sistem mana saja yang boleh mereka buka. Perubahan disimpan otomatis di browser ini.</p>
    <div id="admin-list"></div>
    <div class="add-admin-row">
      <button class="btn-small" onclick="addAdmin()">+ Tambah Akun Admin</button>
    </div>
    <div class="settings-footer">
      <div class="save-note" id="save-note"></div>
      <button class="btn-small" onclick="changeDavidPassword()">Ganti Password David</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   HYPOTECH — data model
   ============================================================ */
const APPS = [
  { id:'erp', name:'ERP', icon:'🏢',
    desc:'Sistem ERP utama Hypospot — katalog, penjualan, pembelian, gudang, keuangan.',
    url:'https://script.google.com/macros/s/AKfycbyOTxLgWkX0RfbXsBJEY8CLXaOHkL-UXtGRROg8mL_cb-IgyuTBcivy-uyvHDhPej71ig/exec' },
  { id:'dashboard-penjualan', name:'Dashboard Penjualan', icon:'📈',
    desc:'Dashboard pemantauan penjualan Hypospot secara real-time.',
    url:'https://davidseptian.github.io/Dashboard-Penjualan/index.html?v=4' },
  { id:'crm', name:'CRM Hypospot', icon:'🤝',
    desc:'Manajemen relasi pelanggan dan tracking follow up.',
    url:'https://davidseptian.github.io/CRM-Hypospot-v2/' },
  { id:'affiliate', name:'Affiliate Tracker', icon:'🔗',
    desc:'Tracking performa affiliator dan komisi.',
    url:'https://davidseptian.github.io/Hypospot-Affiliate-Tracker/' },
  { id:'keuangan', name:'Dashboard Keuangan', icon:'💰',
    desc:'Ringkasan kesehatan finansial Hypospot.',
    url:'https://davidseptian.github.io/Hypospot-Dashboard/' },
  { id:'gaji', name:'Slip Gaji', icon:'🧾',
    desc:'Sistem slip gaji tim Hypospot.',
    url:'https://davidseptian.github.io/System-Gaji/' },
  { id:'invoice', name:'Invoice', icon:'🧻',
    desc:'Pembuatan invoice untuk seluruh SKU Hypospot.',
    url:'https://davidseptian.github.io/Hypospot-Invoice/' },
  { id:'pengeluaran', name:'Pengeluaran 2026', icon:'📤',
    desc:'Sheet pencatatan pengeluaran — tahap PO & produksi.',
    url:'https://docs.google.com/spreadsheets/d/1sYukhsnZpzagl7ecETIMnuhTP8QMcrrwpqB4kuKs4wg/edit?gid=822502124#gid=822502124' },
  { id:'hpp', name:'HPP Update', icon:'🧮',
    desc:'Sheet update Harga Pokok Penjualan per SKU.',
    url:'https://docs.google.com/spreadsheets/d/1jGmcijxHcUxReBM2ezBCBL8B8xUKCrTKvsp63vp1NQI/edit?gid=1647734845#gid=1647734845' },
  { id:'stockmgmt', name:'System Management Stock', icon:'📦',
    desc:'Sheet dashboard stok — dari penerimaan barang sampai stok akhir.',
    url:'https://docs.google.com/spreadsheets/d/1DoHs_TPGjRgkLJ-HjA44ZSnejRGA6c74_o766s7If08/edit?gid=187166075#gid=187166075' },
];

const CATEGORIES = [
  { title:'Operasional & Penjualan', sub:'ERP, CRM, tracking affiliate, dan dashboard penjualan',
    apps:['erp','crm','affiliate','dashboard-penjualan'] },
  { title:'Keuangan', sub:'Dashboard keuangan, gaji, dan invoice',
    apps:['keuangan','gaji','invoice'] },
  { title:'Manajemen Stok', sub:'Alur: PO → Penerimaan Barang → Produksi → Dashboard Stock → Update HPP',
    apps:['pengeluaran','hpp','stockmgmt'] },
];

const STORAGE_KEY = 'hypotech_state_v1';
const SESSION_KEY = 'hypotech_session_v1';

function defaultState(){
  return {
    david:{ username:'david', password:'hypospot2026' },
    admins:[
      { id:'admin-1', username:'admin', password:'admin123', permissions:[] }
    ]
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) { const s = defaultState(); saveState(s); return s; }
    return JSON.parse(raw);
  }catch(e){ const s = defaultState(); saveState(s); return s; }
}
function saveState(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let state = loadState();
let session = null;
try{ session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); }catch(e){ session = null; }

/* ============================================================
   LOGIN
   ============================================================ */
function attemptLogin(){
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if(!u || !p){ errEl.textContent = 'Isi username dan password.'; return; }

  if(u === state.david.username && p === state.david.password){
    session = { role:'david' };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    enterDashboard();
    return;
  }
  const adminMatch = state.admins.find(a => a.username === u && a.password === p);
  if(adminMatch){
    session = { role:'admin', id:adminMatch.id };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    enterDashboard();
    return;
  }
  errEl.textContent = 'Username atau password salah.';
}

function logout(){
  session = null;
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').textContent = '';
}

/* ============================================================
   DASHBOARD RENDER
   ============================================================ */
function currentAllowedAppIds(){
  if(session.role === 'david') return APPS.map(a => a.id);
  const admin = state.admins.find(a => a.id === session.id);
  return admin ? admin.permissions : [];
}

let activeCategory = null; // null = tampilkan semua kategori (dashboard penuh)

function enterDashboard(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  activeCategory = null;

  const roleBadge = document.getElementById('role-badge');
  const greetText = document.getElementById('greet-text');
  const settingsBtn = document.getElementById('settings-btn');
  const financeBtn = document.getElementById('finance-btn');

  if(session.role === 'david'){
    roleBadge.textContent = 'David · Akses Penuh';
    greetText.textContent = 'Halo, David';
    settingsBtn.style.display = 'inline-block';
    financeBtn.style.display = 'inline-block';
  } else {
    const admin = state.admins.find(a => a.id === session.id);
    roleBadge.textContent = 'Admin';
    greetText.textContent = 'Halo, ' + (admin ? admin.username : 'Admin');
    settingsBtn.style.display = 'none';
    financeBtn.style.display = 'none';
  }
  renderCategoryTabs();
  renderMain();
}

function categoriesWithAccess(allowed){
  return CATEGORIES.filter(cat => cat.apps.some(id => allowed.includes(id)));
}

function renderCategoryTabs(){
  const allowed = currentAllowedAppIds();
  const visibleCats = categoriesWithAccess(allowed);
  const tabsEl = document.getElementById('cat-tabs');
  tabsEl.innerHTML = '';

  if(visibleCats.length === 0){ tabsEl.style.display = 'none'; return; }
  tabsEl.style.display = 'flex';

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-tab-btn' + (activeCategory === null ? ' active' : '');
  allBtn.textContent = 'Semua';
  allBtn.addEventListener('click', () => { activeCategory = null; renderCategoryTabs(); renderMain(); });
  tabsEl.appendChild(allBtn);

  visibleCats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab-btn' + (activeCategory === cat.title ? ' active' : '');
    btn.textContent = cat.title;
    btn.addEventListener('click', () => { activeCategory = cat.title; renderCategoryTabs(); renderMain(); });
    tabsEl.appendChild(btn);
  });
}

function renderMain(){
  const allowed = currentAllowedAppIds();
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const catsToShow = activeCategory === null
    ? CATEGORIES
    : CATEGORIES.filter(cat => cat.title === activeCategory);

  catsToShow.forEach(cat => {
    const visibleApps = cat.apps.filter(id => allowed.includes(id)).map(id => APPS.find(a => a.id === id));
    if(visibleApps.length === 0) return;

    const section = document.createElement('section');
    section.className = 'category';

    const head = document.createElement('div');
    head.className = 'category-head';
    head.innerHTML = '<h2>' + escapeHtml(cat.title) + '</h2><p>' + escapeHtml(cat.sub) + '</p>';
    section.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'grid';
    visibleApps.forEach(app => grid.appendChild(renderCard(app)));
    section.appendChild(grid);

    main.appendChild(section);
  });

  if(allowed.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'Belum ada sistem yang diberi akses untuk akun ini. Hubungi David untuk mengatur izin.';
    main.appendChild(empty);
  }
}

function renderCard(app){
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    '<div class="icon">' + app.icon + '</div>' +
    '<h3>' + escapeHtml(app.name) + '</h3>' +
    '<p>' + escapeHtml(app.desc) + '</p>' +
    '<button class="card-open">Buka →</button>';
  card.querySelector('.card-open').addEventListener('click', () => {
    window.open(app.url, '_blank', 'noopener');
  });
  return card;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ============================================================
   SETTINGS (David only)
   ============================================================ */
function openSettings(){
  renderSettings();
  document.getElementById('settings-overlay').style.display = 'flex';
}
function closeSettings(){
  document.getElementById('settings-overlay').style.display = 'none';
}

function renderSettings(){
  const list = document.getElementById('admin-list');
  list.innerHTML = '';

  state.admins.forEach(admin => {
    const block = document.createElement('div');
    block.className = 'admin-block';

    const head = document.createElement('div');
    head.className = 'admin-block-head';
    head.innerHTML =
      '<div class="field"><label>Username</label><input type="text" value="' + escapeAttr(admin.username) + '" data-role="username" /></div>' +
      '<div class="field"><label>Password</label><input type="text" value="' + escapeAttr(admin.password) + '" data-role="password" /></div>';
    block.appendChild(head);

    const permGrid = document.createElement('div');
    permGrid.className = 'perm-grid';
    APPS.forEach(app => {
      const item = document.createElement('label');
      item.className = 'perm-item';
      const checked = admin.permissions.includes(app.id) ? 'checked' : '';
      item.innerHTML = '<input type="checkbox" data-app="' + app.id + '" ' + checked + '> ' + escapeHtml(app.icon + ' ' + app.name);
      permGrid.appendChild(item);
    });
    block.appendChild(permGrid);

    const actions = document.createElement('div');
    actions.className = 'admin-actions';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn-small';
    saveBtn.textContent = 'Simpan Perubahan';
    saveBtn.addEventListener('click', () => saveAdminBlock(admin.id, block));
    const delBtn = document.createElement('button');
    delBtn.className = 'btn-small danger';
    delBtn.textContent = 'Hapus Akun';
    delBtn.addEventListener('click', () => deleteAdmin(admin.id));
    actions.appendChild(saveBtn);
    actions.appendChild(delBtn);
    block.appendChild(actions);

    list.appendChild(block);
  });
}

function escapeAttr(str){
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

function saveAdminBlock(adminId, block){
  const admin = state.admins.find(a => a.id === adminId);
  if(!admin) return;
  const username = block.querySelector('[data-role="username"]').value.trim();
  const password = block.querySelector('[data-role="password"]').value;
  if(!username || !password){
    flashNote('Username & password tidak boleh kosong.', true);
    return;
  }
  const dup = state.admins.find(a => a.username === username && a.id !== adminId);
  if(dup){ flashNote('Username sudah dipakai admin lain.', true); return; }

  const perms = Array.from(block.querySelectorAll('input[type="checkbox"]'))
    .filter(cb => cb.checked)
    .map(cb => cb.getAttribute('data-app'));

  admin.username = username;
  admin.password = password;
  admin.permissions = perms;
  saveState(state);
  flashNote('Perubahan untuk "' + username + '" disimpan.');
}

function deleteAdmin(adminId){
  if(!confirm('Hapus akun admin ini? Tindakan tidak bisa dibatalkan.')) return;
  state.admins = state.admins.filter(a => a.id !== adminId);
  saveState(state);
  renderSettings();
  flashNote('Akun admin dihapus.');
}

function addAdmin(){
  const id = 'admin-' + Date.now();
  state.admins.push({ id, username:'admin-baru', password:'ubah123', permissions:[] });
  saveState(state);
  renderSettings();
  flashNote('Akun admin baru ditambahkan. Ubah username & passwordnya lalu simpan.');
}

function changeDavidPassword(){
  const newPass = prompt('Masukkan password baru untuk akun David:');
  if(!newPass) return;
  state.david.password = newPass;
  saveState(state);
  flashNote('Password David berhasil diperbarui.');
}

function flashNote(msg, isError){
  const note = document.getElementById('save-note');
  note.style.color = isError ? 'var(--danger)' : 'var(--success)';
  note.textContent = msg;
  setTimeout(() => { note.textContent = ''; }, 3200);
}

/* ============================================================
   Decorative network background (signature ecosystem motif)
   ============================================================ */
function drawNetBg(){
  const svg = document.getElementById('netbg');
  const w = 1200, h = 800;
  const nodes = [];
  const cols = 6, rows = 4;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      nodes.push({
        x: (c+0.5)*(w/cols) + (Math.random()*60-30),
        y: (r+0.5)*(h/rows) + (Math.random()*60-30)
      });
    }
  }
  let linesHtml = '';
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 210 && Math.random() < 0.35){
        linesHtml += '<line x1="'+nodes[i].x+'" y1="'+nodes[i].y+'" x2="'+nodes[j].x+'" y2="'+nodes[j].y+'" stroke="#c9a227" stroke-opacity="0.12" stroke-width="1"/>';
      }
    }
  }
  let dotsHtml = '';
  nodes.forEach(n => {
    dotsHtml += '<circle cx="'+n.x+'" cy="'+n.y+'" r="2.4" fill="#c9a227" fill-opacity="0.35"/>';
  });
  svg.innerHTML = linesHtml + dotsHtml;
}
drawNetBg();

/* ============================================================
   INIT — resume session if present
   ============================================================ */
if(session && (session.role === 'david' || (session.role === 'admin' && state.admins.some(a => a.id === session.id)))){
  enterDashboard();
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if(e.key === 'Enter') attemptLogin();
});
